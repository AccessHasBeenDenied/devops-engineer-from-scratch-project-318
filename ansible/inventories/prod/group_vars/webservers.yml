domain_name: bulletin.qamo.ru

# frontend static files configuration
frontend_artifact: https://registry.npmjs.org/@_accesshasbeendenied/project-devops-deploy-frontend/-/project-devops-deploy-frontend-0.0.5.tgz

# certbot configuration
certbot_admin_email: elfirium@yandex.ru
certbot_create_if_missing: true
certbot_create_method: webroot
certbot_testmode: false # true
certbot_certs:
  - name: "{{ domain_name }}"
    webroot: "{{ vhost_root }}"
    domains:
      - "{{ domain_name }}"
    deploy_hook: >-
      mkdir -p /etc/nginx/ssl;
      cp -Lr /etc/letsencrypt/live/{{ domain_name }} /etc/nginx/ssl;

# nginx configuration
vhost_root: /var/www/html
nginx_upstreams:
- name: worker
  servers:
    - localhost:8080

nginx_remove_default_vhost: true
nginx_vhosts: 
  - filename: "{{ domain_name }}.80.conf"
    listen: "80 default_server"
    server_name: "{{ domain_name }}"
    extra_parameters: |
      location ^~ /.well-known/acme-challenge/ {
          root {{ vhost_root }};
          allow all;
          try_files $uri =404;
      }
      location / {
          return 301 https://$server_name$request_uri;
      }


  - filename: "{{ domain_name }}.443.conf"
    listen: "443 ssl http2"
    server_name: "{{ domain_name }}"
    extra_parameters: |
      ssl_certificate     /etc/nginx/ssl/{{ domain_name }}/fullchain.pem;
      ssl_certificate_key /etc/nginx/ssl/{{ domain_name }}/privkey.pem;
      location / {
          root {{ vhost_root }};
          try_files $uri $uri/ =404;
          index index.html;
      }

      location ~ ^(/api/|/swagger-ui/|/v3/) {
        proxy_pass         http://worker;
        proxy_buffering    off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
      }
